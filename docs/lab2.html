<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabColab — Editor Científico Colaborativo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Familjen+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
:root{
  --bg:#0d0e12;--s0:#13141a;--s1:#1a1c24;--s2:#22252f;--s3:#292c38;
  --border:#2a2d3a;--border2:#363a4a;
  --txt:#e4e6f0;--txt2:#8b90a8;--txt3:#52566a;
  --accent:#4ade80;--accent2:#22c55e;
  --blue:#60a5fa;--violet:#a78bfa;--amber:#fbbf24;--red:#f87171;
  --r:12px;--rsm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--txt);font-family:'Familjen Grotesk',sans-serif;font-size:14px;line-height:1.55;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}
a{color:var(--accent);text-decoration:none;}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;}
input,textarea{font:inherit;color:inherit;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal{background:var(--s0);border:1px solid var(--border);border-radius:20px;padding:36px;width:min(440px,94vw);animation:modalIn .3s ease;}
@keyframes modalIn{from{transform:translateY(20px) scale(.96);opacity:0;}to{transform:none;opacity:1;}}
.modal-logo{font-size:2rem;text-align:center;margin-bottom:12px;color:var(--accent);}
.modal-title{font-family:'Instrument Serif',serif;font-size:2rem;font-weight:400;text-align:center;background:linear-gradient(135deg,var(--txt) 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.modal-sub{text-align:center;color:var(--txt3);font-size:13px;margin-bottom:28px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.modal-tabs{display:flex;background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:3px;gap:2px;margin-bottom:22px;}
.modal-tab{flex:1;padding:7px;border-radius:6px;font-size:13px;font-weight:600;color:var(--txt3);transition:all .2s;}
.modal-tab.active{background:var(--s2);color:var(--txt);}
.modal-panel{display:none;}
.modal-panel.active{display:block;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;}
.form-group input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;font-size:14px;color:var(--txt);transition:border-color .2s;outline:none;}
.form-group input:focus{border-color:var(--accent);}
.btn-primary{width:100%;background:var(--accent);color:#0d0e12;border-radius:var(--rsm);padding:11px;font-weight:700;font-size:14px;letter-spacing:.02em;transition:all .2s;margin-top:4px;}
.btn-primary:hover{background:var(--accent2);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-header h3{font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;}
.modal-close{font-size:18px;color:var(--txt3);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--s2);color:var(--txt);}

/* ── APP LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;opacity:0;transition:opacity .3s;}
.app.visible{opacity:1;}

/* ── TOPBAR ── */
.topbar{height:48px;background:var(--s0);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px;flex-shrink:0;z-index:10;}
.topbar-logo{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px;margin-right:4px;}
.topbar-logo span{color:var(--txt);font-size:13px;font-weight:400;}
.room-badge{display:flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:4px 10px;}
.room-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);}
.room-code{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--txt);letter-spacing:.08em;}
.btn-icon{background:var(--s2);border:1px solid var(--border);border-radius:5px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--txt2);transition:all .15s;}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);}
.peers-bar{display:flex;align-items:center;gap:4px;margin-left:2px;}
.peer-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--bg);font-family:'JetBrains Mono',monospace;cursor:default;position:relative;}
.peer-avatar[title]:hover::after{content:attr(title);position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;white-space:nowrap;font-size:11px;color:var(--txt);font-family:'Familjen Grotesk',sans-serif;pointer-events:none;z-index:100;}
.topbar-sep{height:20px;width:1px;background:var(--border);margin:0 2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn-small{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--txt2);transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-small:hover{border-color:var(--accent);color:var(--accent);}
.role-chip{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;}
.role-host{color:var(--accent);border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.07);}
.role-editor{color:var(--blue);border-color:rgba(96,165,250,.25);background:rgba(96,165,250,.07);}
.role-observer{color:var(--txt3);border-color:var(--border);background:transparent;}

/* ── MAIN AREA ── */
.main-area{flex:1;display:flex;overflow:hidden;min-height:0;}
.panel-left{display:flex;flex-direction:column;width:50%;min-width:280px;border-right:1px solid var(--border);}
.panel-right{display:flex;flex-direction:column;flex:1;min-width:240px;}
.resize-handle{width:4px;cursor:col-resize;background:transparent;transition:background .2s;flex-shrink:0;z-index:5;}
.resize-handle:hover,.resize-handle.dragging{background:var(--accent);}

/* ── PANEL TABS ── */
.panel-tabs{display:flex;align-items:center;background:var(--s0);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 8px;gap:2px;height:38px;overflow-x:auto;overflow-y:hidden;}
.panel-tabs::-webkit-scrollbar{height:0;}
.ptab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--txt3);transition:all .2s;white-space:nowrap;flex-shrink:0;}
.ptab.active{background:var(--s2);color:var(--txt);}
.ptab:hover:not(.active){color:var(--txt2);}
.tab-spacer{flex:1;}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#0d0e12;border-radius:8px;min-width:16px;height:16px;padding:0 4px;font-size:9px;font-weight:700;margin-left:4px;}
.hidden{display:none !important;}

/* ── EDITOR TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:2px;padding:0 4px;}
.tool-btn, .btool { user-select: none; }
.tool-btn{background:none;border:1px solid transparent;border-radius:5px;padding:3px 7px;font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace;transition:all .15s;}
.tool-btn:hover{background:var(--s2);border-color:var(--border);color:var(--txt);}
.tool-sep{width:1px;height:16px;background:var(--border);margin:0 2px;flex-shrink:0;}

/* ── BOARD TOOLBAR ── */
.board-tools{display:flex;align-items:center;gap:2px;padding:0 4px;}
.btool{background:none;border:1px solid transparent;border-radius:5px;padding:4px 8px;font-size:13px;color:var(--txt3);transition:all .15s;}
.btool:hover{background:var(--s2);border-color:var(--border);color:var(--txt);}
.btool.active{background:var(--s2);border-color:var(--accent);color:var(--accent);}
.color-picker{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;padding:1px;cursor:pointer;background:none;}
.width-slider{width:60px;accent-color:var(--accent);cursor:pointer;}

/* ── VIEW CONTENT ── */
.view-content{flex:1;overflow:auto;min-height:0;display:flex;flex-direction:column;}
.view-content.hidden{display:none;}

/* ── EDITOR ── */
.editor-wrap{position:relative;flex:1;display:flex;flex-direction:column;}
.editor-textarea{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.75;padding:22px 24px;resize:none;tab-size:2;width:100%;}
.editor-textarea::placeholder{color:var(--txt3);font-style:italic;}
.editor-textarea:read-only{color:var(--txt2);cursor:default;}

/* ── PREVIEW ── */
.preview-wrap{padding:22px 26px;flex:1;}
.preview-empty{color:var(--txt3);font-size:13px;font-style:italic;font-family:'Instrument Serif',serif;}
.preview-wrap h1{font-family:'Instrument Serif',serif;font-size:1.9rem;font-weight:400;color:var(--txt);margin:0 0 14px;line-height:1.15;letter-spacing:-.02em;}
.preview-wrap h2{font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;color:var(--txt);margin:22px 0 10px;font-style:italic;}
.preview-wrap h3{font-family:'Familjen Grotesk',sans-serif;font-size:.85rem;font-weight:700;color:var(--txt);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em;}
.preview-wrap p{color:var(--txt2);font-size:14.5px;margin-bottom:10px;line-height:1.7;}
.preview-wrap strong{color:var(--txt);font-weight:700;}
.preview-wrap em{color:var(--txt);font-style:italic;}
.preview-wrap code{background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);}
.preview-wrap pre{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:14px 16px;overflow-x:auto;margin:12px 0;}
.preview-wrap pre code{background:none;border:none;padding:0;font-size:12.5px;color:var(--txt2);}
.preview-wrap blockquote{border-left:3px solid var(--border2);padding-left:16px;margin:12px 0;color:var(--txt2);font-style:italic;}
.preview-wrap table{width:100%;border-collapse:collapse;font-size:13.5px;margin:12px 0;}
.preview-wrap th{background:var(--s2);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);border:1px solid var(--border);text-align:left;}
.preview-wrap td{padding:8px 12px;color:var(--txt2);border:1px solid var(--border);font-size:13.5px;}
.preview-wrap tr:hover td{background:rgba(255,255,255,.02);}
.preview-wrap ul,.preview-wrap ol{padding-left:22px;color:var(--txt2);font-size:14px;margin:8px 0;}
.preview-wrap li{margin-bottom:4px;}
.preview-wrap hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
.preview-wrap .math-error{color:var(--red);font-family:'JetBrains Mono',monospace;font-size:12px;}
.preview-wrap .katex-display{margin:16px 0;overflow-x:auto;}
.preview-wrap .katex{color:var(--txt);}

/* ── WHITEBOARD ── */
.board-wrap{position:relative;flex:1;background:var(--bg);overflow:hidden;cursor:crosshair;}
.board-canvas{position:absolute;inset:0;width:100%;height:100%;}
.board-text-input{position:absolute;background:rgba(13,14,18,.85);border:1px solid var(--accent);border-radius:4px;padding:4px 8px;color:var(--txt);font-family:'Familjen Grotesk',sans-serif;font-size:14px;min-width:120px;outline:none;display:none;}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0;}
.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.chat-msg{display:flex;flex-direction:column;gap:2px;max-width:90%;}
.chat-msg.own{align-self:flex-end;}
.msg-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3);display:flex;align-items:center;gap:6px;}
.msg-author{font-weight:600;}
.msg-bubble{background:var(--s1);border:1px solid var(--border);border-radius:10px;border-top-left-radius:2px;padding:8px 12px;font-size:13.5px;color:var(--txt2);line-height:1.5;word-break:break-word;}
.chat-msg.own .msg-bubble{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.2);border-radius:10px;border-top-right-radius:2px;color:var(--txt);}
.chat-sys{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);padding:4px 0;}
.chat-input-area{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.chat-input{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s;}
.chat-input:focus{border-color:var(--accent);}
.btn-send{background:var(--accent);color:#0d0e12;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;transition:background .2s;}
.btn-send:hover{background:var(--accent2);}
.typing-indicator{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);padding:2px 16px;height:18px;}

/* ── PEERS ── */
.peers-wrap{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;}
.peer-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s;}
.peer-item:hover{border-color:var(--border2);}
.peer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.peer-info{flex:1;min-width:0;}
.peer-name{font-weight:600;font-size:13.5px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.peer-status{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3);letter-spacing:.08em;}
.peer-actions{display:flex;gap:4px;}
.peer-action-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);color:var(--txt2);background:var(--s2);font-family:'JetBrains Mono',monospace;transition:all .15s;}
.peer-action-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── STATUS BAR ── */
.status-bar{height:26px;background:var(--s0);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s;}
.status-dot.connected{background:var(--accent);}
.status-dot.connecting{background:var(--amber);animation:blink .8s infinite;}
.status-dot.disconnected{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.status-sep{color:var(--border2);}
.status-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.status-hash{color:var(--txt3);font-size:9px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.word-count{color:var(--txt3);}

/* ── EXPORT MODAL ── */
.export-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.export-btn{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 16px;font-size:13.5px;color:var(--txt2);text-align:left;transition:all .2s;display:flex;align-items:center;gap:10px;}
.export-btn:hover{border-color:var(--accent);color:var(--txt);}
.hash-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:14px 16px;}
.hash-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;}
.hash-value{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);word-break:break-all;line-height:1.6;}

/* ── NOTIFICATION TOAST ── */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 18px;font-size:13px;color:var(--txt);z-index:2000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SCROLL STYLES ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--txt3);}

/* ── PRINT STYLES ── */
@media print{
  .topbar,.status-bar,.panel-left,.resize-handle,.panel-tabs{display:none!important;}
  .main-area,.panel-right,.app{display:block!important;height:auto!important;overflow:visible!important;}
  .preview-wrap{padding:20mm;font-size:11pt;line-height:1.6;}
  body{background:white;color:black;}
  .preview-wrap h1,.preview-wrap h2,.preview-wrap h3{color:black;}
  .preview-wrap p,.preview-wrap li,.preview-wrap td{color:#333;}
  .preview-wrap table{border-collapse:collapse;}
  .preview-wrap th,.preview-wrap td{border:1px solid #ccc;}
  .view-content{overflow:visible!important;}
  #preview-view{display:block!important;}
  .katex{color:black!important;}
}

/* ── REMOTE CURSOR ── */
.remote-cursor-line{position:absolute;width:2px;pointer-events:none;transition:left .05s,top .05s;z-index:10;}
.remote-cursor-label{position:absolute;top:-20px;left:0;font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;color:#0d0e12;font-weight:700;}
</style>
</head>
<body>

<!-- SESSION MODAL -->
<div id="modal-overlay" class="modal-overlay active">
  <div class="modal">
    <div class="modal-logo">⬡</div>
    <h2 class="modal-title">LabColab</h2>
    <p class="modal-sub">// editor científico descentralizado</p>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-btn-create">Crear sala</button>
      <button class="modal-tab" id="tab-btn-join">Unirse</button>
    </div>
    <div id="tab-create" class="modal-panel active">
      <div class="form-group">
        <label>Tu nombre</label>
        <input type="text" id="create-name" placeholder="Investigador A" maxlength="32" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Contraseña (cifra el contenido)</label>
        <input type="password" id="create-pass" placeholder="Opcional" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btn-create">Crear sala →</button>
    </div>
    <div id="tab-join" class="modal-panel">
      <div class="form-group">
        <label>Tu nombre</label>
        <input type="text" id="join-name" placeholder="Investigador B" maxlength="32" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Código de sala</label>
        <input type="text" id="join-room" placeholder="ABC123" maxlength="8" style="text-transform:uppercase;letter-spacing:.1em;" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="join-pass" placeholder="Si se configuró" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-join">Unirse →</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div id="export-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Exportar documento</h3>
      <button class="modal-close" id="close-export">✕</button>
    </div>
    <div class="export-opts">
      <button class="export-btn" id="exp-md">📄 Descargar Markdown (.md)</button>
      <button class="export-btn" id="exp-html">🌐 Descargar HTML renderizado</button>
      <button class="export-btn" id="exp-print">🖨 Imprimir / Guardar como PDF</button>
    </div>
    <div class="hash-box">
      <div class="hash-label">SHA-256 del documento</div>
      <div id="doc-hash" class="hash-value">calculando...</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app" style="display:none;">
  <header class="topbar">
    <div class="topbar-logo">⬡ <span>LabColab</span></div>
    <div class="topbar-sep"></div>

<script type="module">
'use strict'

/* ═══════════════════════════════════════════════════════════════════
   CONFIG
   Constantes que el operador puede cambiar antes del deploy.
═══════════════════════════════════════════════════════════════════ */
const CONFIG = Object.freeze({
  // ▼▼▼ Cambia esto con la URL de tu Cloudflare Worker ▼▼▼
  RELAY_URL:       'wss://labcolab-relay.TU_USUARIO.workers.dev',
  RECONNECT_DELAY: 3000,
  PEER_COLORS:     ['#4ade80','#60a5fa','#a78bfa','#fbbf24','#f87171','#34d399','#fb923c','#e879f9'],
  DEFAULT_DOC: `# Nuevo documento científico

Bienvenido a **LabColab** — editor colaborativo descentralizado. Comparte el código de sala con tus colaboradores.

## Cómo usar

- Escribe en **Markdown** con soporte para tablas, código y listas
- Ecuaciones inline con dólar simple: $E = mc^2$
- Ecuaciones en bloque con doble dólar:

$$\\nabla \\cdot \\mathbf{E} = \\frac{\\rho}{\\varepsilon_0}$$

- Activa la **Pizarra** (tab superior) para diagramas y esquemas
- El **Chat** permite comunicación en tiempo real

## Tabla de ejemplo

| Parámetro | Símbolo | Valor |
|:---|:---:|---:|
| Constante de Planck | $h$ | $6.626 \\times 10^{-34}$ J·s |
| Velocidad de la luz | $c$ | $2.998 \\times 10^8$ m/s |
| Constante de Boltzmann | $k_B$ | $1.380 \\times 10^{-23}$ J/K |

## Referencias

1. Einstein, A. (1905). *Zur Elektrodynamik bewegter Körper*. Annalen der Physik.
2. Maxwell, J.C. (1865). *A Dynamical Theory of the Electromagnetic Field*.
`,
})

/* ═══════════════════════════════════════════════════════════════════
   UTILS
   Funciones puras sin efectos secundarios ni dependencias de DOM.
═══════════════════════════════════════════════════════════════════ */
const Utils = (() => {
  const $ = id => document.getElementById(id)

  // Garantiza exactamente n caracteres base-36 en mayúsculas
  const rand = (n = 16) => {
    let s = ''
    while (s.length < n) s += Math.random().toString(36).slice(2)
    return s.slice(0, n).toUpperCase()
  }

  const genId   = () => rand(8) + '-' + rand(4) + '-' + rand(4)
  const genRoom = () => rand(3) + rand(3)

  const hashStr   = s => s.split('').reduce((h, c) => (Math.imul(31, h) + c.charCodeAt(0)) | 0, 0)
  const peerColor = id => CONFIG.PEER_COLORS[Math.abs(hashStr(id)) % CONFIG.PEER_COLORS.length]
  const initials  = name => name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase() || '??'
  const clamp     = (v, a, b) => Math.max(a, Math.min(b, v))
  const escHtml   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

  const debounce = (fn, delay) => {
    let t
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay) }
  }

  // Aplica un diff mínimo entre oldStr y newStr sobre un Y.Text
  const applyDiff = (yt, oldStr, newStr, doc) => {
    let i = 0, j = oldStr.length, k = newStr.length
    while (i < j && i < k && oldStr[i] === newStr[i]) i++
    while (j > i && k > i && oldStr[j-1] === newStr[k-1]) { j--; k-- }
    doc.transact(() => {
      if (j > i) yt.delete(i, j - i)
      if (k > i) yt.insert(i, newStr.slice(i, k))
    }, 'local')
  }

  const sha256 = async text => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text))
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('')
  }

  // Descarga un archivo cross-browser (Safari/Firefox requieren anchor en el DOM)
  const download = (filename, content, mime = 'text/plain') => {
    const a = document.createElement('a')
    const url = URL.createObjectURL(new Blob([content], { type: mime }))
    a.href = url
    a.download = filename
    a.style.display = 'none'
    document.body.appendChild(a)
    a.click()
    setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a) }, 300)
  }

  return { $, rand, genId, genRoom, peerColor, initials, clamp, escHtml,
           debounce, applyDiff, sha256, download }
})()

const { $, genId, genRoom, peerColor, initials, clamp, escHtml,
        debounce, applyDiff, sha256, download } = Utils

/* ═══════════════════════════════════════════════════════════════════
   STATE
   Un único objeto de estado de sesión. Inmutable durante la sesión
   salvo a través de métodos explícitos de cada módulo.
═══════════════════════════════════════════════════════════════════ */
const State = (() => {
  let _s = {
    // Identidad
    peerId:    null,
    name:      'Anónimo',
    role:      'observer',
    roomId:    null,
    // Conexión
    connected: false,
    // UI
    leftPanel:  'editor-view',
    rightPanel: 'preview-view',
    unread:     0,
    _lastRoleTs: 0,
    // Pizarra
    boardTool:    'pen',
    boardColor:   '#4ade80',
    boardWidth:   2,
    drawing:      false,
    activeStroke: null,
    strokes:      [],
  }

  // Proxy para detectar mutaciones no autorizadas en desarrollo
  const get = key       => _s[key]
  const set = (key, v)  => { _s[key] = v }
  const patch = (obj)   => { Object.assign(_s, obj) }
  const snapshot = ()   => ({ ..._s })

  return { get, set, patch, snapshot }
})()

/* ═══════════════════════════════════════════════════════════════════
   EVENT BUS
   Canal de comunicación desacoplado entre módulos.
   Ningún módulo llama funciones de otro módulo directamente.
═══════════════════════════════════════════════════════════════════ */
const Bus = (() => {
  const _listeners = {}

  const on = (event, cb) => {
    if (!_listeners[event]) _listeners[event] = []
    _listeners[event].push(cb)
  }

  const off = (event, cb) => {
    if (!_listeners[event]) return
    _listeners[event] = _listeners[event].filter(fn => fn !== cb)
  }

  const emit = (event, data) => {
    ;(_listeners[event] || []).forEach(cb => {
      try { cb(data) }
      catch(e) { console.error(`Bus error [${event}]:`, e) }
    })
  }

  return { on, off, emit }
})()

/* ═══════════════════════════════════════════════════════════════════
   UI MODULE
   Todas las actualizaciones del DOM viven aquí.
   Escucha eventos del Bus para renderizarse.
═══════════════════════════════════════════════════════════════════ */
const UI = (() => {
  // ── Toast ──────────────────────────────────────────────────────
  let _toastTimer = null
  const toast = (msg, dur = 2800) => {
    const el = $('toast')
    el.textContent = msg
    el.classList.add('show')
    clearTimeout(_toastTimer)
    _toastTimer = setTimeout(() => el.classList.remove('show'), dur)
  }

  // ── Connection status ──────────────────────────────────────────
  const setConnectionStatus = (status) => {
    // status: 'connected' | 'connecting' | 'disconnected'
    const dot  = $('status-dot')
    const text = $('status-text')
    dot.className = 'status-dot ' + status
    const labels = {
      connected:    'Conectado',
      connecting:   'Conectando...',
      disconnected: 'Desconectado — reconectando...',
      error:        'Error de conexión',
    }
    text.textContent = labels[status] ?? status
  }

  // ── Role chip ──────────────────────────────────────────────────
  const setRole = (role) => {
    const chip = $('role-chip')
    chip.className = 'role-chip role-' + role
    chip.textContent = role
    const ta = $('editor-textarea')
    ta.readOnly    = (role === 'observer')
    ta.style.opacity = role === 'observer' ? '0.6' : '1'
  }

  // ── Status bar ─────────────────────────────────────────────────
  const setWordCount = (words) => {
    $('word-count').textContent = words + ' palabras'
  }

  const setHash = (h) => {
    $('status-hash').textContent = h ? 'SHA-256: ' + h.slice(0, 16) + '...' : ''
  }

  const setSaveStatus = (msg) => {
    $('status-save').textContent = msg
  }

  const setPeersCount = (n) => {
    $('status-peers').textContent = n + (n === 1 ? ' peer' : ' peers')
  }

  // ── Peers bar (avatares en topbar) ─────────────────────────────
  const renderPeersBar = (states) => {
    const bar = $('peers-bar')
    bar.innerHTML = ''
    let i = 0
    states.forEach((state, clientId) => {
      if (!state || !state.name || i >= 6) return
      i++
      const color = state.color || peerColor(clientId.toString())
      const el = document.createElement('div')
      el.className   = 'peer-avatar'
      el.style.background = color
      el.style.color = '#0d0e12'
      el.textContent = initials(state.name)
      el.title = state.name + (clientId.toString() === State.get('peerId') ? ' (tú)' : '')
      bar.appendChild(el)
    })
  }

  // ── Peers list (panel) ─────────────────────────────────────────
  const renderPeersList = (states) => {
    const list = $('peers-list')
    list.innerHTML = ''
    let count = 0
    const myPeerId = State.get('peerId')
    const myRole   = State.get('role')

    states.forEach((state, clientId) => {
      if (!state || !state.name) return
      count++
      const cid   = clientId.toString()
      const isMe  = cid === myPeerId
      const color = state.color || peerColor(cid)
      const role  = state.role || 'editor'

      const div = document.createElement('div')
      div.className = 'peer-item'
      div.innerHTML = `
        <div class="peer-dot" style="background:${color}"></div>
        <div class="peer-info">
          <div class="peer-name">${escHtml(state.name)}${isMe ? ' <span style="color:var(--txt3);font-size:11px;">(tú)</span>' : ''}</div>
          <div class="peer-status">${role} · ${isMe ? 'local' : 'remoto'}</div>
        </div>
        ${myRole === 'host' && !isMe ? `
          <div class="peer-actions">
            <button class="peer-action-btn" onclick="App.setRole(${JSON.stringify(cid)}, 'editor')">Editor</button>
            <button class="peer-action-btn" onclick="App.setRole(${JSON.stringify(cid)}, 'observer')">Obs.</button>
          </div>` : ''}
      `
      list.appendChild(div)
    })

    setPeersCount(states.has(myPeerId) ? count : count + 1)
    renderTypingIndicator(states)
  }

  // ── Typing indicator ───────────────────────────────────────────
  const renderTypingIndicator = (states) => {
    const myPeerId = State.get('peerId')
    const typing = []
    states.forEach((state, id) => {
      if (id.toString() !== myPeerId && state && state.typing && state.name)
        typing.push(state.name.split(' ')[0])
    })
    $('typing-indicator').textContent =
      typing.length ? `${typing.slice(0, 2).join(', ')} está escribiendo...` : ''
  }

  // ── Chat message ───────────────────────────────────────────────
  const appendChatMsg = (msg) => {
    const container  = $('chat-messages')
    const atBottom   = container.scrollHeight - container.scrollTop - container.clientHeight < 40
    const myPeerId   = State.get('peerId')

    if (msg.type === 'system') {
      const el = document.createElement('div')
      el.className   = 'chat-sys'
      el.textContent = msg.text
      container.appendChild(el)
    } else {
      const isOwn = msg.peerId === myPeerId
      const div   = document.createElement('div')
      div.className = 'chat-msg' + (isOwn ? ' own' : '')
      const time  = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      div.innerHTML = `
        <div class="msg-meta">
          <span class="msg-author" style="color:${msg.color || 'var(--accent)'}">${escHtml(msg.name || '?')}</span>
          <span>${time}</span>
        </div>
        <div class="msg-bubble">${escHtml(msg.text)}</div>
      `
      container.appendChild(div)

      // Badge de no leídos cuando el panel de chat no está activo
      if (State.get('rightPanel') !== 'chat-view' && !isOwn) {
        const unread = State.get('unread') + 1
        State.set('unread', unread)
        const badge = $('chat-badge')
        badge.textContent = unread > 9 ? '9+' : unread
        badge.classList.remove('hidden')
      }
    }

    if (atBottom) container.scrollTop = container.scrollHeight
  }

  // ── Panel switching ────────────────────────────────────────────
  const switchPanel = (target, side) => {
    const panelId = side === 'left' ? 'panel-left' : 'panel-right'
    const panel   = $(panelId)

    panel.querySelectorAll('[data-panel]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.panel === target)
    })
    panel.querySelectorAll('.view-content').forEach(v => {
      v.classList.toggle('hidden', v.id !== target)
    })

    if (side === 'left') {
      State.set('leftPanel', target)
      $('editor-toolbar').classList.toggle('hidden', target !== 'editor-view')
      $('board-toolbar').classList.toggle('hidden', target !== 'board-view')
    } else {
      State.set('rightPanel', target)
      if (target === 'chat-view') {
        State.set('unread', 0)
        $('chat-badge').classList.add('hidden')
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight
        $('chat-input').focus()
      }
    }

    Bus.emit('panel:switched', { target, side })
  }

  // ── App visibility ─────────────────────────────────────────────
  const showApp = (roomId) => {
    $('modal-overlay').classList.remove('active')
    $('room-code-display').textContent = roomId
    const app = $('app')
    app.style.display = 'flex'
    setTimeout(() => app.classList.add('visible'), 50)
    setConnectionStatus('connecting')
    const url = new URL(location.href)
    url.searchParams.set('room', roomId)
    history.pushState({}, '', url)
  }

  // ── Preview ────────────────────────────────────────────────────
  const renderPreview = (html) => {
    $('preview-content').innerHTML = html ||
      '<p class="preview-empty">La vista previa aparecerá mientras escribes...</p>'
  }

  // ── Hash display in export modal ───────────────────────────────
  const setDocHash = (h) => {
    $('doc-hash').textContent = h
  }

  // ── Bus subscriptions ──────────────────────────────────────────
  Bus.on('awareness:changed',  ({ states }) => { renderPeersBar(states); renderPeersList(states) })
  Bus.on('connection:status',  ({ status }) => setConnectionStatus(status))
  Bus.on('editor:wordcount',   ({ words })  => setWordCount(words))
  Bus.on('editor:hash',        ({ hash })   => setHash(hash))
  Bus.on('editor:saved',       ()           => { setSaveStatus('✓ Guardado'); setTimeout(() => setSaveStatus('Guardado local'), 2000) })
  Bus.on('role:changed',       ({ role })   => setRole(role))
  Bus.on('chat:message',       ({ msg })    => appendChatMsg(msg))
  Bus.on('preview:rendered',   ({ html })   => renderPreview(html))

  return { toast, setRole, setConnectionStatus, showApp, switchPanel,
           renderPeersBar, renderPeersList, setDocHash, setHash }
})()

const toast = UI.toast

/* ═══════════════════════════════════════════════════════════════════
   CRYPTO MODULE
   Encriptación AES-256-GCM para mensajes del relay.
═══════════════════════════════════════════════════════════════════ */
const Crypto = (() => {
  let _key = null

  const init = async (password, roomId) => {
    const enc = new TextEncoder()
    const material = await crypto.subtle.importKey(
      'raw', enc.encode(password || 'labcolab-default'),
      { name: 'PBKDF2' }, false, ['deriveKey']
    )
    _key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: enc.encode('labcolab-' + roomId), iterations: 100000, hash: 'SHA-256' },
      material,
      { name: 'AES-GCM', length: 256 },
      false, ['encrypt', 'decrypt']
    )
  }

  const encrypt = async (data) => {
    if (!_key) {
      // Sin clave: pasar los bytes tal cual como ArrayBuffer
      return data instanceof Uint8Array
        ? data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength)
        : data
    }
    const iv  = crypto.getRandomValues(new Uint8Array(12))
    const buf = data instanceof Uint8Array
      ? data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength)
      : data
    const ct  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, _key, buf)
    const out = new Uint8Array(12 + ct.byteLength)
    out.set(iv, 0)
    out.set(new Uint8Array(ct), 12)
    return out.buffer
  }

  const decrypt = async (data) => {
    if (!_key) return data
    try {
      const buf = data instanceof ArrayBuffer ? data : await data.arrayBuffer()
      const arr = new Uint8Array(buf)
      return await crypto.subtle.decrypt({ name: 'AES-GCM', iv: arr.slice(0, 12) }, _key, arr.slice(12))
    } catch {
      return null // clave incorrecta o mensaje corrupto
    }
  }

  return { init, encrypt, decrypt }
})()

/* ═══════════════════════════════════════════════════════════════════
   RELAY MODULE
   WebSocket con reconexión automática y codec binario propio.
   Protocolo: 1 byte tipo (0x01=sync, 0x02=awareness) + payload.
═══════════════════════════════════════════════════════════════════ */
const Relay = (() => {
  let _ws       = null
  let _roomId   = null
  let _password = null

  const TYPE = { sync: 0x01, awareness: 0x02 }
  const TYPE_INV = { [TYPE.sync]: 'sync', [TYPE.awareness]: 'awareness' }

  const _encode = (type, payload) => {
    // payload debe ser Uint8Array
    const out = new Uint8Array(1 + payload.length)
    out[0] = TYPE[type]
    out.set(payload, 1)
    return out
  }

  const _decode = (arr) => {
    if (!arr || arr.length < 2) return null
    const type = TYPE_INV[arr[0]]
    return type ? { type, payload: arr.slice(1) } : null
  }

  const send = async (type, payload) => {
    if (!_ws || _ws.readyState !== WebSocket.OPEN) return
    const encoded   = _encode(type, payload)
    const encrypted = await Crypto.encrypt(encoded)
    _ws.send(encrypted)
  }

  const _connect = (onOpen) => {
    const url = CONFIG.RELAY_URL.replace(/\/+$/, '') + '/room/' + _roomId
    _ws = new WebSocket(url)
    _ws.binaryType = 'arraybuffer'

    _ws.addEventListener('open', () => {
      Bus.emit('connection:status', { status: 'connected' })
      State.set('connected', true)
      if (onOpen) onOpen()
    })

    _ws.addEventListener('message', async (e) => {
      const raw = await Crypto.decrypt(e.data)
      if (!raw) return
      const msg = _decode(new Uint8Array(raw))
      if (!msg) return
      Bus.emit('relay:message', msg)
    })

    _ws.addEventListener('close', () => {
      Bus.emit('connection:status', { status: 'disconnected' })
      State.set('connected', false)
      setTimeout(() => _connect(() => {
        Bus.emit('relay:reconnected')
      }), CONFIG.RECONNECT_DELAY)
    })

    _ws.addEventListener('error', () => {
      Bus.emit('connection:status', { status: 'error' })
    })
  }

  const connect = (roomId, password, onOpen) => {
    _roomId   = roomId
    _password = password
    _connect(onOpen)
  }

  return { connect, send }
})()

/* ═══════════════════════════════════════════════════════════════════
   AWARENESS MODULE
   Implementación propia de awareness Yjs compatible con el relay.
═══════════════════════════════════════════════════════════════════ */
const Awareness = (() => {
  const _states    = new Map()  // clientId (string) → state
  const _listeners = []

  const getStates = () => new Map(_states)

  const setLocalState = (state) => {
    const id = State.get('peerId')
    if (!id) return
    _states.set(id, state)
    _broadcast()
  }

  const setLocalField = (field, value) => {
    const id  = State.get('peerId')
    if (!id) return
    const cur = _states.get(id) || {}
    cur[field] = value
    _states.set(id, cur)
    _broadcast()
  }

  const _broadcast = () => {
    const id = State.get('peerId')
    if (!id) return
    const payload = new TextEncoder().encode(JSON.stringify({
      clientId: id,
      state:    _states.get(id) || {}
    }))
    Relay.send('awareness', payload)
  }

  // Mensaje de awareness recibido del relay
  const handleIncoming = (payloadBytes) => {
    try {
      const { clientId, state } = JSON.parse(new TextDecoder().decode(payloadBytes))
      if (state === null) {
        _states.delete(clientId)
      } else {
        _states.set(clientId, state)
      }
      Bus.emit('awareness:changed', { states: getStates() })
    } catch(e) {
      console.warn('Awareness parse error:', e)
    }
  }

  // Objeto compatible con el API awareness de Yjs (para UndoManager etc.)
  const yjsCompat = {
    getStates,
    setLocalState,
    setLocalStateField: setLocalField,
    on: (event, cb) => { if (event === 'change') _listeners.push(cb) },
  }

  Bus.on('relay:message', (msg) => {
    if (msg.type === 'awareness') handleIncoming(msg.payload)
  })

  return { getStates, setLocalState, setLocalField, yjsCompat }
})()

/* ═══════════════════════════════════════════════════════════════════
   YJS MODULE
   Gestiona el documento CRDT, persistencia IDB, y sincronización.
═══════════════════════════════════════════════════════════════════ */
const Yjs = (() => {
  let _Y, _IndexeddbPersistence
  let _doc, _text, _strokes, _chat, _session, _meta
  let _undoManager
  let _idb

  const load = async () => {
    try {
      const yjsMod = await import('https://esm.sh/yjs@13.6.18?bundle')
      _Y = yjsMod.default ? { ...yjsMod.default, ...yjsMod } : yjsMod
      const idbMod = await import('https://esm.sh/y-indexeddb@9.0.12?deps=yjs@13.6.18&bundle')
      _IndexeddbPersistence = idbMod.IndexeddbPersistence
      return true
    } catch(e) {
      console.error('Error cargando librerías Yjs:', e)
      return false
    }
  }

  const init = async (roomId, password, isHost) => {
    const ok = await load()
    if (!ok) {
      toast('Error: no se pudieron cargar las librerías. Modo local activo.')
      Bus.emit('connection:status', { status: 'disconnected' })
      return false
    }

    await Crypto.init(password, roomId)

    _doc     = new _Y.Doc()
    _text    = _doc.getText('editor')
    _strokes = _doc.getArray('strokes')
    _chat    = _doc.getArray('chat')
    _session = _doc.getMap('session')
    _meta    = _doc.getMap('meta')

    State.set('peerId', _doc.clientID.toString())

    // Persistencia local IDB
    _idb = new _IndexeddbPersistence(`labcolab-${roomId}`, _doc)
    _idb.on('synced', () => {
      if (isHost && _text.length === 0) {
        _doc.transact(() => _text.insert(0, CONFIG.DEFAULT_DOC), 'init')
      }
      Bus.emit('yjs:synced')
    })

    // Reenviar al relay solo cambios generados localmente
    // 'local' = edición del usuario
    // 'init'  = inserción del DEFAULT_DOC por el host
    // No reenviar: 'remote' (eco), null/idb (flood desde IndexedDB)
    _doc.on('update', (update, origin) => {
      if (origin === 'local' || origin === 'init') {
        Relay.send('sync', update)
      }
    })

    // Aplicar updates remotos recibidos del relay
    Bus.on('relay:message', (msg) => {
      if (msg.type === 'sync') {
        try { _Y.applyUpdate(_doc, msg.payload, 'remote') }
        catch(e) { console.warn('Error aplicando update Yjs:', e) }
      }
    })

    // Al reconectar: reenviar snapshot completo y re-anunciar presencia
    Bus.on('relay:reconnected', () => {
      Relay.send('sync', _Y.encodeStateAsUpdate(_doc))
      Awareness.setLocalState({
        name: State.get('name'), role: State.get('role'),
        color: Utils.peerColor(State.get('peerId')),
        cursor: null, boardStroke: null,
      })
    })

    // Conectar relay y anunciar presencia al abrir
    Relay.connect(roomId, password, () => {
      Relay.send('sync', _Y.encodeStateAsUpdate(_doc))
      Awareness.setLocalState({
        name: State.get('name'), role: State.get('role'),
        color: Utils.peerColor(State.get('peerId')),
        cursor: null, boardStroke: null,
      })
    })

    _undoManager = new _Y.UndoManager(_text, { captureTimeout: 500 })

    if (isHost) {
      _session.set('host',     State.get('peerId'))
      _session.set('hostName', State.get('name'))
      _session.set('created',  Date.now())
      _meta.set('title', 'Nuevo documento')
    }

    return true
  }

  // Escucha cambios del ySession para señales de rol
  const watchRoleSignals = () => {
    if (!_session) return
    _session.observe(event => {
      if (!event.keysChanged.has('roleSignals')) return
      const signals = _session.get('roleSignals') || {}
      const myId    = _doc.clientID.toString()
      const signal  = signals[myId]
      if (signal && signal.ts > State.get('_lastRoleTs')) {
        State.set('_lastRoleTs', signal.ts)
        State.set('role', signal.role)
        Bus.emit('role:changed', { role: signal.role })
        Awareness.setLocalField('role', signal.role)
        toast('Tu rol cambió a: ' + signal.role)
      }
    })
  }

  const setRole = (clientId, role) => {
    if (State.get('role') !== 'host' || !_session) return
    const signals = _session.get('roleSignals') || {}
    signals[clientId.toString()] = { role, ts: Date.now() }
    _session.set('roleSignals', { ...signals })
    toast('Rol asignado: ' + role)
  }

  // Accesores para otros módulos
  const getText    = () => _text
  const getStrokes = () => _strokes
  const getChat    = () => _chat
  const getDoc     = () => _doc
  const getUndo    = () => _undoManager

  return { init, watchRoleSignals, setRole,
           getText, getStrokes, getChat, getDoc, getUndo }
})()

/* ═══════════════════════════════════════════════════════════════════
   EDITOR MODULE
   Gestiona textarea ↔ Y.Text y el toolbar de formato.
═══════════════════════════════════════════════════════════════════ */
const Editor = (() => {
  let _lastValue  = ''
  let _savedSel   = { start: 0, end: 0 }

  const _ta = () => $('editor-textarea')

  const _saveSelection = () => {
    const ta = _ta()
    _savedSel = { start: ta.selectionStart, end: ta.selectionEnd }
  }

  const _getSelection = () => {
    const ta = _ta()
    return document.activeElement === ta
      ? { s: ta.selectionStart, e: ta.selectionEnd }
      : { s: _savedSel.start,   e: _savedSel.end  }
  }

  // Aplica un nuevo valor al textarea y sincroniza con Yjs
  const _applyValue = (newFull, newSelStart, newSelEnd) => {
    const ta  = _ta()
    ta.value  = newFull
    ta.focus()
    ta.setSelectionRange(newSelStart, newSelEnd)
    const yText = Yjs.getText()
    if (yText && Yjs.getDoc()) {
      try {
        applyDiff(yText, _lastValue, newFull, Yjs.getDoc())
      } catch(e) {
        console.warn('applyDiff falló:', e)
      }
    }
    _lastValue = newFull
    _updateMetrics()
  }

  const wrapSelection = (before, after) => {
    const ta  = _ta()
    const { s, e } = _getSelection()
    const sel = ta.value.slice(s, e) || 'texto'
    const full = ta.value.slice(0, s) + before + sel + after + ta.value.slice(e)
    _applyValue(full, s + before.length, s + before.length + sel.length)
  }

  const insertAtCursor = (text) => {
    const ta  = _ta()
    const { s, e } = _getSelection()
    const full = ta.value.slice(0, s) + text + ta.value.slice(e)
    _applyValue(full, s + text.length, s + text.length)
  }

  const _broadcastCursor = () => {
    const ta = _ta()
    if (!State.get('peerId')) return
    Awareness.setLocalField('cursor', { pos: ta.selectionStart, name: State.get('name') })
  }

  const _debouncedHash = debounce(async () => {
    const content = Yjs.getText() ? Yjs.getText().toString() : ''
    const h = await sha256(content)
    Bus.emit('editor:hash', { hash: h })
    return h
  }, 2000)

  const _debouncedSave = debounce(() => Bus.emit('editor:saved'), 3000)

  const _updateMetrics = () => {
    const text  = (_ta().value || '').replace(/[#*_`$\[\]]/g, '').trim()
    const words = text ? text.split(/\s+/).length : 0
    Bus.emit('editor:wordcount', { words })
    _debouncedHash()
    Bus.emit('editor:changed', { value: _ta().value })
  }

  const getComputedHash = async () => {
    const content = Yjs.getText() ? Yjs.getText().toString() : ''
    const h = await sha256(content)
    Bus.emit('editor:hash', { hash: h })
    return h
  }

  // Aplicar cambio remoto de Yjs al textarea, preservando cursor
  const _syncFromYjs = () => {
    const ta     = _ta()
    const newVal = Yjs.getText().toString()
    if (ta.value === newVal) return
    const ss = ta.selectionStart, se = ta.selectionEnd
    ta.value   = newVal
    _lastValue = newVal
    ta.setSelectionRange(clamp(ss, 0, newVal.length), clamp(se, 0, newVal.length))
    _updateMetrics()
  }

  const setup = () => {
    const ta    = _ta()
    const yText = Yjs.getText()

    // Y.Text → textarea (cambios remotos)
    yText.observe(event => {
      if (event.transaction.origin === 'local') return
      _syncFromYjs()
    })

    // Sincronizar desde IDB al cargar
    Bus.on('yjs:synced', () => _syncFromYjs())

    // textarea → Y.Text (cambios locales)
    ta.addEventListener('input', () => {
      _saveSelection()
      if (!Yjs.getText()) return
      const newVal = ta.value
      applyDiff(Yjs.getText(), _lastValue, newVal, Yjs.getDoc())
      _lastValue = newVal
      _updateMetrics()
      _debouncedSave()
      _broadcastCursor()
    })

    ta.addEventListener('focus',  _saveSelection)
    ta.addEventListener('keyup',  () => { _saveSelection(); _broadcastCursor() })
    ta.addEventListener('click',  () => { _saveSelection(); _broadcastCursor() })
    ta.addEventListener('select', () => { _saveSelection(); _broadcastCursor() })

    ta.addEventListener('keydown', e => {
      _saveSelection()

      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); Yjs.getUndo()?.undo() }
        if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) { e.preventDefault(); Yjs.getUndo()?.redo() }
        if (e.key === 'b') { e.preventDefault(); wrapSelection('**', '**') }
        if (e.key === 'i') { e.preventDefault(); wrapSelection('*', '*') }
        if (e.key === 'k') { e.preventDefault(); wrapSelection('$', '$') }
        if (e.key === 's') { e.preventDefault(); toast('✓ Guardado localmente') }
      }

      if (e.key === 'Tab') {
        e.preventDefault()
        const s    = ta.selectionStart
        const full = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd)
        _applyValue(full, s + 2, s + 2)
      }
    })

    // Toolbar de formato
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (State.get('role') === 'observer') return
        const ACTIONS = {
          'bold':        () => wrapSelection('**', '**'),
          'italic':      () => wrapSelection('*', '*'),
          'code':        () => wrapSelection('`', '`'),
          'h1':          () => insertAtCursor('\n# '),
          'h2':          () => insertAtCursor('\n## '),
          'h3':          () => insertAtCursor('\n### '),
          'math-inline': () => wrapSelection('$', '$'),
          'math-block':  () => insertAtCursor('\n\n$$\n\n$$\n\n'),
          'ul':          () => insertAtCursor('\n- '),
          'hr':          () => insertAtCursor('\n---\n'),
          'table':       () => insertAtCursor('\n| Columna 1 | Columna 2 | Columna 3 |\n|:---|:---:|---:|\n| Dato | Dato | Dato |\n'),
        }
        ACTIONS[btn.dataset.action]?.()
      })
    })
  }

  return { setup, wrapSelection, insertAtCursor, getComputedHash }
})()

/* ═══════════════════════════════════════════════════════════════════
   PREVIEW MODULE
   Renderiza Markdown + KaTeX. Sin efectos secundarios de red.
═══════════════════════════════════════════════════════════════════ */
const Preview = (() => {
  marked.setOptions({ breaks: true, gfm: true })

  // Separador de placeholders único para esta sesión
  const MATH_PFX = '\x02MATH'
  const MATH_SFX = '\x03'
  const CODE_PFX = '\x02CODE'
  const CODE_SFX = '\x03'
  const mkMath = i => `${MATH_PFX}${i}${MATH_SFX}`
  const mkCode = i => `${CODE_PFX}${i}${CODE_SFX}`

  const render = (md) => {
    if (!md || !md.trim()) return ''

    const mathBlocks = []
    const codeBlocks = []

    // 1) Proteger bloques de código (no procesar $ dentro)
    let s = md.replace(/(```[\s\S]*?```|`[^`]+`)/g, (m) => {
      const i = codeBlocks.length
      codeBlocks.push(m)
      return mkCode(i)
    })

    // 2) Extraer matemáticas en bloque $$...$$
    s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, latex) => {
      const i = mathBlocks.length
      mathBlocks.push({ latex, display: true })
      return `\n\n${mkMath(i)}\n\n`
    })

    // 3) Extraer matemáticas inline $...$
    s = s.replace(/(?<!\\)\$([^$\n]+?)\$/g, (_, latex) => {
      const i = mathBlocks.length
      mathBlocks.push({ latex, display: false })
      return mkMath(i)
    })

    // 4) Restaurar bloques de código
    codeBlocks.forEach((code, i) => { s = s.split(mkCode(i)).join(code) })

    // 5) Renderizar Markdown
    let html = marked.parse(s)

    // 6) Restaurar y renderizar matemáticas
    mathBlocks.forEach(({ latex, display }, i) => {
      const ph = mkMath(i)
      try {
        const rendered    = katex.renderToString(latex.trim(), { displayMode: display, throwOnError: false, strict: false })
        const replacement = display ? `</p><div class="katex-display">${rendered}</div><p>` : rendered
        html = html.split(ph).join(replacement)
      } catch {
        html = html.split(ph).join(`<span class="math-error">[LaTeX: ${escHtml(latex)}]</span>`)
      }
    })

    // 7) Limpiar <p></p> vacíos por inserción de divs
    return html.replace(/<p>\s*<\/p>/g, '')
  }

  const setup = () => {
    Bus.on('editor:changed', ({ value }) => {
      Bus.emit('preview:rendered', { html: render(value) })
    })
  }

  return { setup, render }
})()

/* ═══════════════════════════════════════════════════════════════════
   BOARD MODULE
   Pizarra colaborativa con canvas 2D y herramientas de dibujo.
═══════════════════════════════════════════════════════════════════ */
const Board = (() => {
  let _canvas, _ctx, _dpr = 1
  let _initialized = false
  let _peersStrokes = {}  // strokes en vuelo de otros peers (awareness)
  let _rafId = null

  // ── Ciclo de redibujado con requestAnimationFrame ──────────────
  const _scheduleRedraw = () => {
    if (!_rafId) _rafId = requestAnimationFrame(() => { _rafId = null; _redraw() })
  }

  const _redraw = () => {
    if (!_ctx) return
    const w = _canvas.width / _dpr, h = _canvas.height / _dpr
    _ctx.fillStyle = '#0d0e12'
    _ctx.fillRect(0, 0, w, h)

    // Cuadrícula de puntos
    _ctx.fillStyle = '#1a1c24'
    for (let x = 20; x < w; x += 20)
      for (let y = 20; y < h; y += 20) {
        _ctx.beginPath(); _ctx.arc(x, y, 0.7, 0, Math.PI * 2); _ctx.fill()
      }

    State.get('strokes').forEach(s => _drawStroke(s))

    Object.values(_peersStrokes).forEach(s => {
      if (s) { _ctx.globalAlpha = 0.65; _drawStroke(s); _ctx.globalAlpha = 1 }
    })

    const active = State.get('activeStroke')
    if (active) _drawStroke(active)
  }

  // ── Primitivas de dibujo ───────────────────────────────────────
  const _drawPen = (pts) => {
    if (!pts || pts.length < 2) return
    _ctx.beginPath()
    _ctx.moveTo(pts[0][0], pts[0][1])
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i][0] + pts[i+1][0]) / 2, my = (pts[i][1] + pts[i+1][1]) / 2
      _ctx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my)
    }
    _ctx.lineTo(pts[pts.length-1][0], pts[pts.length-1][1])
    _ctx.stroke()
  }

  const _drawStroke = (s) => {
    if (!s || !s.tool) return
    _ctx.save()
    _ctx.strokeStyle = s.color || '#4ade80'
    _ctx.fillStyle   = s.color || '#4ade80'
    _ctx.lineWidth   = s.width || 2
    _ctx.lineCap     = 'round'
    _ctx.lineJoin    = 'round'

    switch (s.tool) {
      case 'pen': case 'eraser':
        _drawPen(s.points); break
      case 'line':
        _ctx.beginPath(); _ctx.moveTo(s.x1, s.y1); _ctx.lineTo(s.x2, s.y2); _ctx.stroke(); break
      case 'rect':
        _ctx.strokeRect(Math.min(s.x1, s.x2), Math.min(s.y1, s.y2), Math.abs(s.x2 - s.x1), Math.abs(s.y2 - s.y1)); break
      case 'circle': {
        const cx = (s.x1+s.x2)/2, cy = (s.y1+s.y2)/2, rx = Math.abs(s.x2-s.x1)/2, ry = Math.abs(s.y2-s.y1)/2
        _ctx.beginPath(); _ctx.ellipse(cx, cy, Math.max(rx, 1), Math.max(ry, 1), 0, 0, Math.PI*2); _ctx.stroke(); break
      }
      case 'arrow': {
        _ctx.beginPath(); _ctx.moveTo(s.x1, s.y1); _ctx.lineTo(s.x2, s.y2); _ctx.stroke()
        const angle = Math.atan2(s.y2 - s.y1, s.x2 - s.x1), size = Math.max(10, (s.width || 2) * 4)
        _ctx.beginPath()
        _ctx.moveTo(s.x2, s.y2)
        _ctx.lineTo(s.x2 - size * Math.cos(angle - Math.PI/6), s.y2 - size * Math.sin(angle - Math.PI/6))
        _ctx.lineTo(s.x2 - size * Math.cos(angle + Math.PI/6), s.y2 - size * Math.sin(angle + Math.PI/6))
        _ctx.closePath(); _ctx.fill(); break
      }
      case 'text':
        _ctx.font = `${s.fontSize || 16}px 'Familjen Grotesk',sans-serif`
        _ctx.fillText(s.text, s.x1, s.y1); break
    }
    _ctx.restore()
  }

  // ── Canvas resize ──────────────────────────────────────────────
  const _resize = () => {
    if (!_canvas) return
    _dpr = window.devicePixelRatio || 1
    const wrap = $('board-wrap')
    const w = wrap.offsetWidth, h = wrap.offsetHeight
    _canvas.width  = w * _dpr
    _canvas.height = h * _dpr
    _canvas.style.width  = w + 'px'
    _canvas.style.height = h + 'px'
    _ctx.scale(_dpr, _dpr)
    _redraw()
  }

  const _getPos = (e) => {
    const r = _canvas.getBoundingClientRect()
    return { x: e.clientX - r.left, y: e.clientY - r.top }
  }

  // ── Texto en pizarra ───────────────────────────────────────────
  const _commitText = () => {
    const inp  = $('board-text-input')
    const text = inp.value.trim()
    inp.style.display = 'none'
    if (!text) return
    Yjs.getStrokes().push([{
      id: genId(), tool: 'text', color: State.get('boardColor'),
      fontSize: 16, text,
      x1: parseFloat(inp.dataset.x), y1: parseFloat(inp.dataset.y),
      peerId: State.get('peerId'), peerName: State.get('name'), ts: Date.now(),
    }])
  }

  // ── Eventos de canvas ──────────────────────────────────────────
  const _onStart = (e) => {
    if (State.get('role') === 'observer') return
    const { x, y } = _getPos(e)

    if (State.get('boardTool') === 'text') {
      const inp = $('board-text-input')
      inp.style.display = 'block'
      inp.style.left = x + 'px'
      inp.style.top  = (y - 18) + 'px'
      inp.dataset.x  = x
      inp.dataset.y  = y
      inp.value      = ''
      inp.focus()
      return
    }

    State.set('drawing', true)
    State.set('activeStroke', {
      id: genId(), tool: State.get('boardTool'),
      color: State.get('boardTool') === 'eraser' ? '#0d0e12' : State.get('boardColor'),
      width: State.get('boardTool') === 'eraser' ? State.get('boardWidth') * 5 : State.get('boardWidth'),
      peerId: State.get('peerId'), peerName: State.get('name'),
      ts: Date.now(), points: [[x, y]], x1: x, y1: y, x2: x, y2: y,
    })
  }

  const _onMove = (e) => {
    if (!State.get('drawing') || !State.get('activeStroke')) return
    const { x, y } = _getPos(e)
    const s = State.get('activeStroke')
    s.x2 = x; s.y2 = y
    if (s.tool === 'pen' || s.tool === 'eraser') s.points.push([x, y])
    Awareness.setLocalField('boardStroke', { ...s })
    _scheduleRedraw()
  }

  const _onEnd = () => {
    if (!State.get('drawing') || !State.get('activeStroke')) return
    State.set('drawing', false)
    const s = State.get('activeStroke')
    State.set('activeStroke', null)
    if ((s.tool === 'pen' || s.tool === 'eraser') && s.points.length < 2) return
    if (s.tool !== 'pen' && s.tool !== 'eraser' && Math.abs(s.x2 - s.x1) < 4 && Math.abs(s.y2 - s.y1) < 4) return
    Yjs.getStrokes().push([s])
    Awareness.setLocalField('boardStroke', null)
  }

  const init = () => {
    if (_initialized) { _resize(); return }
    _initialized = true
    _canvas = $('board-canvas')
    _ctx    = _canvas.getContext('2d')
    _resize()
    new ResizeObserver(_resize).observe($('board-wrap'))

    _canvas.addEventListener('mousedown', _onStart)
    _canvas.addEventListener('mousemove', _onMove)
    _canvas.addEventListener('mouseup',   _onEnd)
    _canvas.addEventListener('mouseleave', _onEnd)
    _canvas.addEventListener('touchstart', e => { e.preventDefault(); _onStart(e.touches[0]) }, { passive: false })
    _canvas.addEventListener('touchmove',  e => { e.preventDefault(); _onMove(e.touches[0])  }, { passive: false })
    _canvas.addEventListener('touchend',   e => { e.preventDefault(); _onEnd()               }, { passive: false })

    $('board-text-input').addEventListener('keydown', e => {
      if (e.key === 'Enter')  _commitText()
      if (e.key === 'Escape') $('board-text-input').style.display = 'none'
    })

    // Sincronizar strokes desde Yjs
    Yjs.getStrokes().observe(() => {
      // Los items se guardan como [stroke] (array wrapper de Yjs); desenvolver
      State.set('strokes', Yjs.getStrokes().toArray().map(item => Array.isArray(item) ? item[0] : item))
      _scheduleRedraw()
    })

    // Strokes en vuelo de otros peers (awareness)
    Bus.on('awareness:changed', ({ states }) => {
      _peersStrokes = {}
      const myId = State.get('peerId')
      states.forEach((state, clientId) => {
        if (clientId.toString() !== myId && state?.boardStroke) {
          _peersStrokes[clientId] = state.boardStroke
        }
      })
      _scheduleRedraw()
    })
  }

  const resize = _resize

  return { init, resize }
})()

/* ═══════════════════════════════════════════════════════════════════
   CHAT MODULE
   Mensajería en tiempo real sobre Y.Array.
═══════════════════════════════════════════════════════════════════ */
const Chat = (() => {
  let _typingTimer = null

  const send = () => {
    const inp  = $('chat-input')
    const text = inp.value.trim()
    if (!text) return
    Yjs.getChat().push([{
      id: genId(), peerId: State.get('peerId'),
      name: State.get('name'), color: Utils.peerColor(State.get('peerId')),
      text, ts: Date.now(),
    }])
    inp.value = ''
    Awareness.setLocalField('typing', false)
  }

  const setup = () => {
    // Sincronizar mensajes entrantes desde Yjs
    Yjs.getChat().observe(event => {
      event.changes.delta.forEach(op => {
        if (!op.insert) return
        // Los items se guardan como [msg] (array wrapper de Yjs); desenvolver
        op.insert.forEach(item => {
          const msg = Array.isArray(item) ? item[0] : item
          Bus.emit('chat:message', { msg })
        })
      })
    })

    // Indicador de escritura
    $('chat-input').addEventListener('input', () => {
      if (!State.get('peerId')) return
      Awareness.setLocalField('typing', true)
      clearTimeout(_typingTimer)
      _typingTimer = setTimeout(() => {
        if (State.get('peerId')) Awareness.setLocalField('typing', false)
      }, 2000)
    })

    $('btn-send').addEventListener('click', send)
    $('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
    })
  }

  return { setup, send }
})()

/* ═══════════════════════════════════════════════════════════════════
   EXPORT MODULE
   Exporta el documento en varios formatos.
═══════════════════════════════════════════════════════════════════ */
const Export = (() => {
  const open = async () => {
    const h = await Editor.getComputedHash()
    UI.setDocHash(h)
    $('export-modal').classList.add('active')
  }

  const close = () => $('export-modal').classList.remove('active')

  const setup = () => {
    $('btn-export-open').addEventListener('click', open)
    $('close-export').addEventListener('click', close)
    $('export-modal').addEventListener('click', e => { if (e.target === $('export-modal')) close() })

    $('exp-md').addEventListener('click', () => {
      const content = Yjs.getText()?.toString() ?? ''
      download(`labcolab-${State.get('roomId') || 'doc'}-${Date.now()}.md`, content, 'text/markdown')
      toast('Markdown descargado')
    })

    $('exp-html').addEventListener('click', async () => {
      const content = $('preview-content').innerHTML
      const h       = await Editor.getComputedHash()
      const html = `<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<title>LabColab Export</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>body{font-family:Georgia,serif;max-width:800px;margin:40px auto;padding:0 24px;line-height:1.7;color:#222;}
h1,h2,h3{margin-top:1.5em;}table{border-collapse:collapse;width:100%;}td,th{border:1px solid #ccc;padding:8px 12px;}
pre{background:#f5f5f5;padding:12px;border-radius:4px;overflow-x:auto;}
footer{margin-top:40px;padding-top:16px;border-top:1px solid #ccc;font-size:11px;color:#888;}
</style></head>
<body>${content}
<footer>Sala: ${State.get('roomId')} · Exportado: ${new Date().toISOString()} · SHA-256: ${h}</footer>
</body></html>`
      download(`labcolab-${State.get('roomId') || 'doc'}.html`, html, 'text/html')
      toast('HTML descargado')
    })

    $('exp-print').addEventListener('click', () => window.print())
  }

  return { setup }
})()

/* ═══════════════════════════════════════════════════════════════════
   SESSION MODULE
   Orquesta el inicio de sesión y coordina todos los módulos.
═══════════════════════════════════════════════════════════════════ */
const Session = (() => {
  const start = async (roomId, password, isHost) => {
    State.patch({ name: State.get('name'), role: isHost ? 'host' : 'editor', roomId })
    UI.showApp(roomId)

    const ok = await Yjs.init(roomId, password, isHost)
    if (!ok) return

    // Inicializar módulos que dependen de Yjs
    Editor.setup()
    Preview.setup()
    Chat.setup()
    Board.init()
    Yjs.watchRoleSignals()

    // Anunciar rol inicial en UI
    Bus.emit('role:changed', { role: State.get('role') })

    // Actualizar peers tras inicialización de awareness
    setTimeout(() => {
      const states = Awareness.getStates()
      Bus.emit('awareness:changed', { states })
    }, 300)

    // Mensaje de sistema en chat
    setTimeout(() => {
      Bus.emit('chat:message', {
        msg: {
          type: 'system',
          text: `Sala ${roomId} — ${isHost ? 'creada' : 'unido'} como ${State.get('name')}`,
          ts: Date.now(),
        }
      })
      toast(isHost ? `Sala ${roomId} creada ✓` : `Unido a sala ${roomId} ✓`)
    }, 500)
  }

  return { start }
})()

/* ═══════════════════════════════════════════════════════════════════
   APP MODULE
   Event handlers de la UI raíz: modales, panel tabs, resize, etc.
   Punto de entrada único tras DOMContentLoaded.
═══════════════════════════════════════════════════════════════════ */
const App = (() => {
  // Expuesto en window para botones inline de peers (setRole)
  window.App = { setRole: Yjs.setRole }

  const _init = () => {
    // ── Modal tabs ──────────────────────────────────────────────
    $('tab-btn-create').addEventListener('click', () => {
      $('tab-btn-create').classList.add('active')
      $('tab-btn-join').classList.remove('active')
      $('tab-create').classList.add('active')
      $('tab-join').classList.remove('active')
    })
    $('tab-btn-join').addEventListener('click', () => {
      $('tab-btn-join').classList.add('active')
      $('tab-btn-create').classList.remove('active')
      $('tab-join').classList.add('active')
      $('tab-create').classList.remove('active')
    })

    // ── Crear sala ──────────────────────────────────────────────
    $('btn-create').addEventListener('click', () => {
      const name   = $('create-name').value.trim() || 'Investigador'
      const pass   = $('create-pass').value
      const roomId = genRoom()
      State.patch({ name })
      Session.start(roomId, pass, true)
    })

    // ── Unirse a sala ───────────────────────────────────────────
    $('btn-join').addEventListener('click', () => {
      const name   = $('join-name').value.trim() || 'Investigador'
      const roomId = $('join-room').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '')
      const pass   = $('join-pass').value
      if (!roomId) { toast('Ingresa un código de sala'); return }
      State.patch({ name })
      Session.start(roomId, pass, false)
    })

    // Enter en campos del modal
    ;['create-name', 'create-pass'].forEach(id =>
      $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-create').click() })
    )
    ;['join-name', 'join-room', 'join-pass'].forEach(id =>
      $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-join').click() })
    )

    // ── Copiar enlace de sala ───────────────────────────────────
    $('btn-copy-room').addEventListener('click', () => {
      const url = `${location.origin}${location.pathname}?room=${State.get('roomId')}`
      navigator.clipboard.writeText(url)
        .then(() => toast('Enlace copiado al portapapeles'))
        .catch(() => navigator.clipboard.writeText(State.get('roomId'))
          .then(() => toast('Código copiado: ' + State.get('roomId'))))
    })

    // ── Export ──────────────────────────────────────────────────
    Export.setup()

    // ── Panel tabs ──────────────────────────────────────────────
    document.querySelectorAll('[data-panel]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.panel
        const group  = btn.closest('.panel-tabs')
        const isLeft = group.closest('#panel-left') !== null
        UI.switchPanel(target, isLeft ? 'left' : 'right')
        if (isLeft && target === 'board-view') {
          Board.init()
          // El cursor del canvas se actualiza tras init
          const canvas = $('board-canvas')
          if (canvas) canvas.style.cursor = State.get('boardTool') === 'text' ? 'text' : 'crosshair'
        }
      })
    })

    // ── Board tools ─────────────────────────────────────────────
    document.querySelectorAll('[data-btool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-btool]').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        State.set('boardTool', btn.dataset.btool)
        const canvas = $('board-canvas')
        if (canvas) canvas.style.cursor = State.get('boardTool') === 'text' ? 'text' : 'crosshair'
      })
    })

    $('board-color').addEventListener('input', e => State.set('boardColor', e.target.value))
    $('board-width').addEventListener('input', e => State.set('boardWidth', +e.target.value))

    $('btn-clear-board').addEventListener('click', () => {
      if (State.get('role') === 'observer') { toast('Sin permisos para limpiar'); return }
      if (!confirm('¿Limpiar toda la pizarra?')) return
      const yStrokes = Yjs.getStrokes()
      if (yStrokes) Yjs.getDoc().transact(() => yStrokes.delete(0, yStrokes.length))
      State.set('strokes', [])
      Bus.emit('board:cleared')
      toast('Pizarra limpiada')
    })

    // ── Resize handle ───────────────────────────────────────────
    let _resizing = false, _resizeStartX = 0, _resizeStartW = 0
    $('resize-handle').addEventListener('mousedown', e => {
      _resizing    = true
      _resizeStartX = e.clientX
      _resizeStartW = $('panel-left').offsetWidth
      $('resize-handle').classList.add('dragging')
      document.body.style.userSelect = 'none'
      document.body.style.cursor     = 'col-resize'
    })
    document.addEventListener('mousemove', e => {
      if (!_resizing) return
      $('panel-left').style.width = clamp(_resizeStartW + (e.clientX - _resizeStartX), 280, window.innerWidth - 280) + 'px'
    })
    document.addEventListener('mouseup', () => {
      if (!_resizing) return
      _resizing = false
      $('resize-handle').classList.remove('dragging')
      document.body.style.userSelect = ''
      document.body.style.cursor     = ''
      if (State.get('leftPanel') === 'board-view') Board.resize()
    })

    // ── Atajos de teclado globales ──────────────────────────────
    document.addEventListener('keydown', e => {
      if (!e.altKey) return
      if (e.key === 'b') document.querySelector('[data-panel="board-view"]').click()
      if (e.key === 'e') document.querySelector('[data-panel="editor-view"]').click()
      if (e.key === 'c') document.querySelector('[data-panel="chat-view"]').click()
    })

    // ── Auto-fill desde URL ─────────────────────────────────────
    const urlRoom = new URLSearchParams(location.search).get('room')
    if (urlRoom) {
      $('tab-btn-join').click()
      $('join-room').value = urlRoom.toUpperCase()
      $('join-name').focus()
    } else {
      $('create-name').focus()
    }
  }

  // Esperar al DOM antes de registrar cualquier listener
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _init)
  } else {
    _init()
  }

  return {}
})()

</script>
</body>
</html>
